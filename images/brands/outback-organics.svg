<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 90">
  <defs>
    <path id="arc-top" d="M 12,45 A 33,33 0 0,1 78,45"/>
    <path id="arc-bot" d="M 12,45 A 33,33 0 0,0 78,45"/>
  </defs>

  <!-- Outer ring -->
  <circle cx="45" cy="45" r="43" fill="none" stroke="white" stroke-width="1.2"/>
  <!-- Inner ring -->
  <circle cx="45" cy="45" r="36" fill="none" stroke="white" stroke-width="0.5"/>

  <!-- OUTBACK curved text at top -->
  <text font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="8" font-weight="600" letter-spacing="3" fill="white">
    <textPath href="#arc-top" startOffset="50%" text-anchor="middle">OUTBACK</textPath>
  </text>

  <!-- Central leaf emblem -->
  <g transform="translate(45,45)" fill="white">
    <rect x="-0.7" y="5" width="1.4" height="10" rx="0.7"/>
    <path d="M0,5 C-9,-2 -9,-18 0,-22 C9,-18 9,-2 0,5 Z"/>
  </g>

  <!-- ORGANICS curved text at bottom -->
  <text font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="7" font-weight="400" letter-spacing="2.5" fill="white">
    <textPath href="#arc-bot" startOffset="50%" text-anchor="middle" dy="-3">ORGANICS</textPath>
  </text>
</svg>
