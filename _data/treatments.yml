meta_title: "Treatments — Niobe Beauty"
meta_desc: "Facials, body massage, body wraps, nails, hair removal, beauty services and thermal facilities at Niobe Beauty, Accra and Tema."

hero:
  eyebrow: "Treatments"
  title: "Tailored to you,"
  title_em: "every visit"
  desc: "Every session is adapted by your therapist based on what your skin or body needs that day. We do not apply a universal protocol to every client."

intro_note: "A 100% non-refundable deposit is required for all bookings. 5% discount when two or more guests book together."

cta:
  eyebrow: "Book"
  heading: "Ready to book"
  heading_em: "a treatment?"
  desc: "Contact us to confirm availability and secure your appointment. A 100% non-refundable deposit is required."

categories:

  - id: "facials"
    number: "01"
    name: "Facials"
    intro: "Our facial menu spans three professional ranges: Elemis hands-on treatments for immediate visible results, Elemis BIOTEC technology-led facials for clinical-level precision, and Murad targeted skin therapies for specific concerns including pigmentation, acne, ageing and sensitivity. Your therapist will assess your skin at the start of every session and adapt the treatment accordingly."
    groups:
      - label: "CACI Treatments"
        items:
          - name: "CACI Eye Lift"
            desc: "A focused treatment for the eye area using gentle microcurrent to lift and tone the muscles around the eyes. Helps to lighten dark circles, reduce puffiness and soften fine lines. Results are visible after a single session and improve with a course of treatments."
            duration: "25 min"
            price: "GHS 250"
          - name: "CACI Jowl Lift"
            desc: "Targets the muscles along the jawline using quad-probe applicators designed to double the lifting effect of standard microcurrent. Firms and defines the lower face, improving the appearance of sagging or softening around the jaw."
            duration: "30 min"
            price: "GHS 360"
          - name: "CACI Non-Surgical Face Lift"
            desc: "A full-face microcurrent treatment that lifts, tones and tightens facial muscles while smoothing fine lines and wrinkles. The process is painless and non-invasive, with visible results from the first session. A course of treatments is recommended for cumulative, longer-lasting improvement."
            duration: "60 min"
            price: "GHS 500"
      - label: "Elemis Hands-On Facials"
        items:
          - name: "Elemis Skin Booster Facial"
            desc: "A thirty-minute treatment designed for noticeable results in a short window. Cleanses, exfoliates and hydrates to leave the complexion visibly smoother and brighter. Works well on its own or as an addition to a massage, manicure or other service. Recommended monthly."
            duration: "30 min"
            price: "GHS 400"
          - name: "Elemis Anti-Blemish Mattify and Calm"
            desc: "A deep-cleansing facial that targets excess oil and shine while calming inflammation and restoring healthy circulation. Leaves congested, blemish-prone skin looking clearer, more balanced and visibly brighter."
            duration: "60 min"
            price: "GHS 560"
          - name: "Elemis Sensitive Skin Soothing Facial"
            desc: "Formulated for reactive and easily irritated skin. Gentle, calming massage techniques are combined with products that reduce visible redness and strengthen the skin's natural defences against environmental stress. The complexion is left comfortable, even-toned and less reactive."
            duration: "60 min"
            price: "GHS 560"
          - name: "Elemis Superfood Pro-Radiance Facial"
            desc: "A nutrient-rich facial that feeds tired, dull skin with concentrated plant actives and superfoods. Detoxifies, plumps and brings visible brightness back to a complexion that has lost its natural energy. Ideal for skin that looks flat or overworked."
            duration: "60 min"
            price: "GHS 560"
          - name: "Elemis White Brightening Pigment Perfector"
            desc: "A targeted treatment for uneven skin tone, dark spots and areas of hyperpigmentation. Encapsulated Vitamin C works as a potent brightener, helping to inhibit future pigmentation while creating a more even, luminous complexion."
            duration: "60 min"
            price: "GHS 560"
          - name: "Elemis Pro-Definition Lift and Contour"
            desc: "Uses potent plant actives and sculpting massage techniques to lift, firm and redefine facial contours. Designed for skin that is beginning to lose definition, particularly around the jawline, cheekbones and neck."
            duration: "60 min"
            price: "GHS 560"
          - name: "Elemis High Performance Skin Energiser (Men)"
            desc: "A results-driven facial for male skin, addressing dehydration, dullness and early signs of ageing. Includes scalp and foot massage alongside a thorough cleanse, exfoliation and hydration treatment tailored to the thicker, oilier texture of male skin."
            duration: "60 min"
            price: "GHS 560"
      - label: "Elemis BIOTEC Facials"
        items:
          - name: "Elemis BIOTEC Express"
            desc: "A condensed version of the full BIOTEC facial, using the same technology in a shorter format. Suited to busier schedules when you want clinical-level results without a full seventy-five-minute commitment."
            duration: "35 min"
            price: "GHS 500"
          - name: "Elemis BIOTEC Eye Treatment"
            desc: "A technology-led treatment focused entirely on the eye area. Microcurrent stimulation tightens and tones the delicate skin around the eyes, reducing puffiness and the appearance of fine lines."
            duration: "30 min"
            price: "GHS 250"
          - name: "Elemis BIOTEC Sensitive Skin Soother"
            desc: "A gentle, technology-assisted facial for skin prone to redness and sensitivity. Calming massage is paired with BIOTEC modalities selected to strengthen the skin without triggering irritation. Leaves the complexion settled, hydrated and visibly less reactive."
            duration: "75 min"
            price: "GHS 600"
          - name: "Elemis BIOTEC Anti-Pigment Brightener"
            desc: "Tackles uneven skin tone, discolouration and age spots using a combination of brightening actives, ultrasonic peel and light therapy. Reveals a more translucent, even complexion with improved clarity and luminosity."
            duration: "75 min"
            price: "GHS 600"
          - name: "Elemis BIOTEC Control Facial"
            desc: "A deep-cleansing facial that uses ultrasonic vibration, galvanic current, steam and massage to thoroughly decongest and exfoliate. Anti-oxidant formulations calm the skin while light therapy helps clear the complexion. Designed for oily, congested or problem skin."
            duration: "75 min"
            price: "GHS 600"
          - name: "Elemis BIOTEC Firm-A-Lift"
            desc: "A sculpting facial that uses galvanic technology and targeted massage to lift, firm and visibly redefine facial contours. Strengthens the skin's structure for a complexion that appears tighter and more lifted."
            duration: "75 min"
            price: "GHS 600"
          - name: "Elemis BIOTEC L.E.D. Blemish Control"
            desc: "Combines ultrasonic peeling, galvanic current, steam and clinically proven LED light therapy to deeply cleanse and rebalance oily, breakout-prone skin. Anti-blemish actives including Rosalina, Lavender and Sweet Marjoram work alongside the technology to reduce inflammation, clear pores and visibly improve skin clarity."
            duration: "75 min"
            price: "GHS 600"
          - name: "Elemis BIOTEC Line Eraser"
            desc: "A clinically proven anti-wrinkle facial that uses microcurrent pulses and red and blue light therapy to energise the skin, smooth lines and improve overall firmness. Targets established wrinkles with measurable results."
            duration: "75 min"
            price: "GHS 600"
          - name: "Elemis BIOTEC Radiance Renew"
            desc: "For dull, sluggish complexions that need visible clarity. Ultrasonic peeling removes impurities and dead skin cells while galvanic current drives moisture deep into the skin. The result is an immediately brighter, cleaner complexion."
            duration: "75 min"
            price: "GHS 600"
          - name: "Elemis BIOTEC Sonic Skin Resurfacer"
            desc: "A resurfacing facial that combines concentrated lactic and hyaluronic acid with ultrasonic peeling, steam and light therapy. Delivers a high-tech double peel that smooths texture, evens tone and minimises the appearance of blemish marks and fine lines."
            duration: "75 min"
            price: "GHS 700"
          - name: "Elemis BIOTEC Super-Charge Facial (Men)"
            desc: "A high-performance facial designed for male skin. Combines steam, ultrasonic peeling and galvanic current with targeted actives including Kalpariane, Allantoin and Salicornia to deep-cleanse, firm, hydrate and reduce visible signs of ageing. Cuts through congestion and oiliness with noticeable precision."
            duration: "75 min"
            price: "GHS 700"
          - name: "Elemis BIOTEC Triple-Tec Anti-Wrinkle"
            desc: "The most advanced anti-ageing facial in the BIOTEC range. Targets both face and eye area using an intensive complex of Padina Pavonica, African Birch Bark and Tripeptides. Microcurrent lifts and firms, light therapy boosts collagen production, and oxygen infusion plumps and smooths visible lines and wrinkles."
            duration: "75 min"
            price: "GHS 700"
          - name: "Elemis Dynamic Resurfacing Precision Peel"
            desc: "A clinically proven resurfacing treatment that uses layers of active enzymes for powerful exfoliation and skin renewal. Targets signs of ageing, dullness and uneven tone. Results in smoother, clearer, younger-looking skin with improved texture from the first treatment."
            duration: "75 min"
            price: "GHS 700"
      - label: "Murad Facials"
        items:
          - name: "Murad Acne Complex Facial"
            desc: "A professional-strength treatment for active breakouts and acne-prone skin. Exfoliating fruit enzymes open clogged pores for deep cleansing and extraction without irritation, while targeted actives reduce blemishes, calm redness and improve clarity. Suitable for all levels of acne severity, and also available for back and décolleté."
            duration: "60 min"
            price: "GHS 560"
          - name: "Murad Blemish Control Facial"
            desc: "For occasional breakouts, persistent oiliness or congested skin. A blend of fruit enzymes, antioxidants and hydrating agents deep-cleans pores, reduces redness and blemishes, and helps prevent future breakouts. Noticeably improves skin clarity after a single treatment."
            duration: "60 min"
            price: "GHS 560"
          - name: "Murad Redness Therapy Facial"
            desc: "Fast relief for easily inflamed, sensitive skin prone to redness triggered by stress, sun, wind or temperature changes. Features two intensely calming masks and patented anti-inflammatory formulations that settle irritation and strengthen the skin against future flare-ups."
            duration: "60 min"
            price: "GHS 560"
          - name: "Murad Resurgence Renewal Facial"
            desc: "A multi-active facial for skin affected by dryness, fine lines, loss of elasticity and hormonal changes. Advanced collagen-building technology boosts resilience and firmness, while gentle exfoliation removes dullness and stimulates cell renewal. Restores suppleness, tone and a visible glow."
            duration: "60 min"
            price: "GHS 560"
          - name: "Murad Sun Undone Vitamin C Infusion"
            desc: "An antioxidant-rich treatment designed to repair the effects of environmental exposure. Patented infusion technology delivers pure Vitamin C directly into the skin, restoring clarity, fading pigmentation and smoothing fine lines. Visible improvement in texture and firmness from the first session."
            duration: "60 min"
            price: "GHS 560"
          - name: "Murad AHA Rapid Exfoliator"
            desc: "Concentrated Glycolic Acid exfoliates dead skin cells while a patented blend of antioxidants and hydrators calms and conditions the skin beneath. When performed as a series, your therapist gradually increases the treatment strength, progressively improving texture, tone and overall skin quality. Suitable for all skin types."
            duration: "75 min"
            price: "GHS 700"
          - name: "Murad Intensive Wrinkle Reducer Peel"
            desc: "Powerful exfoliators work to dramatically reduce the appearance of wrinkles while infusing the skin with lasting hydration. Delivers significant improvements in texture and tone without the severe irritation associated with high-performance peels. Murad's Durian Cell Reform® technology enhances penetration of anti-ageing actives for a brighter, smoother, firmer result."
            duration: "75 min"
            price: "GHS 700"
          - name: "Murad IP5 Intensive Peel"
            desc: "Murad's most advanced anti-ageing peel. Five exfoliating and brightening ingredients resurface the skin, treating deeper lines, wrinkles and uneven texture. Designed for mature skin that needs measurable renewal."
            duration: "75 min"
            price: "GHS 700"
          - name: "Murad Rapid Peel Age Reform"
            desc: "A clinically proven peel that reduces visible wrinkles while delivering long-lasting hydration. Murad's Durian Cell Reform® technology ensures anti-ageing ingredients penetrate effectively, producing brighter, smoother and firmer skin after a single treatment. Effective without excessive irritation."
            duration: "60 min"
            price: "GHS 700"
      - label: "Specialist Treatments"
        items:
          - name: "Microdermabrasion"
            desc: "A controlled exfoliation treatment that uses fine abrasion to remove dead outer layers of skin, clear pores and stimulate cell renewal. Leaves the complexion smoother, more even and visibly refreshed. Effective for dull skin, congestion and rough texture."
            duration: "80 min"
            price: "GHS 760"
          - name: "Mini Million Dollar Facial"
            desc: "A sixty-minute version of the full Million Dollar protocol, delivering the same targeted approach to fine lines, pores, scarring and pigmentation in a more concentrated format. Firmer, brighter skin with results that last."
            duration: "60 min"
            price: "GHS 700"
          - name: "Million Dollar Super Facial"
            desc: "Our most advanced facial treatment. Over two hours, this multi-phase protocol targets fine lines, enlarged pores, scarring, pigmentation and irregular texture using professional-grade technologies and active formulations. Results are visible immediately and typically last four weeks or longer."
            duration: "120 min"
            price: "GHS 1,400"

  - id: "massage"
    number: "02"
    name: "Body Massage"
    intro: "Our massage menu includes Elemis full-body treatments, targeted therapies and specialist techniques. Every session is tailored by your therapist, who will adjust pressure, focus areas and pace based on what your body needs. Available in sixty and ninety-minute formats at most locations."
    groups:
      - label: ""
        items:
          - name: "Elemis Deeper Than Deep Hot Stone Massage"
            desc: "Smooth, heated stones are placed along the body and used to massage deep into the muscles, releasing tension that hands alone sometimes cannot reach. Warmed oils are applied throughout, hydrating the skin while the sustained heat softens tight areas across the back, shoulders and legs. The longer format allows your therapist to work more slowly and cover the full body more thoroughly."
            duration: "60 / 90 min"
            price: "GHS 370 / 480"
          - name: "Elemis Freestyle Deep Tissue Massage"
            desc: "A firm, focused massage tailored entirely to your body. Your therapist works into the areas carrying the most tension, using deep pressure to ease knotted muscle and improve mobility. The approach adapts to each session. Suited to clients who carry physical strain from exercise, posture or prolonged sitting."
            duration: "60 / 90 min"
            price: "GHS 360 / 460"
          - name: "Elemis Garden of England Rose Restore Massage (Swedish)"
            desc: "A full-body Swedish massage using rose-infused oils that hydrate the skin while long, flowing strokes ease tension and improve circulation. The pressure is lighter than deep tissue, with a calming pace and a warm, floral fragrance that stays on the skin. A good choice when the body needs to soften and slow down rather than be worked on intensively."
            duration: "60 / 90 min"
            price: "GHS 340 / 440"
          - name: "Elemis Hot Mineral Body Boost Massage"
            desc: "A mineral-rich full-body massage that uses light to medium pressure to ease muscular discomfort, stimulate circulation and condition the skin. The mineral formulations give this treatment a more energising quality than a standard relaxation massage. Pressure is adjusted to your preference."
            duration: "60 / 90 min"
            price: "GHS 340 / 440"
          - name: "Elemis Peaceful Pregnancy Massage"
            desc: "Adapted specifically for pregnancy, this massage uses safe positioning and gentle pressure to relieve tension through the back, shoulders, hips, hands and feet. Available from the second trimester onward. Not suitable for clients with recent operations (within six months), undiagnosed swelling or chronic back conditions."
            duration: "75 min"
            price: "GHS 400"
          - name: "Head, Back and Neck Massage"
            desc: "Focused massage for the areas that accumulate the most tension. Your therapist works through the upper back, neck and shoulders before moving to the scalp. Effective for tightness caused by desk work, stress or poor posture."
            duration: "30 min"
            price: "GHS 300"
          - name: "Indian Head Massage"
            desc: "An Ayurvedic technique that uses specific pressure and massage movements across the head, neck and shoulders to release tension and promote a sense of calm. Performed seated, without oils."
            duration: "30 min"
            price: "GHS 220"
          - name: "Reflexology"
            desc: "A pressure-point therapy applied to the feet, based on the principle that specific zones on the sole correspond to different areas of the body. The treatment aims to support balance and wellbeing through focused, sustained pressure. The sixty-minute format allows for more thorough coverage and deeper work."
            duration: "30 / 60 min"
            price: "GHS 220 / 320"
          - name: "Foot Massage"
            desc: "A therapeutic foot massage that applies targeted pressure to relieve tension, improve circulation and bring a noticeable sense of ease to the lower legs and feet."
            duration: "30 min"
            price: "GHS 140"

  - id: "wraps"
    number: "03"
    name: "Body Wraps & Scrubs"
    intro: "Elemis body wraps and scrubs work on the skin's surface and below it, using marine actives, botanical ingredients and mineral-rich formulations to exfoliate, hydrate, nourish and tone. Many wraps include a facial massage, scalp treatment or foot massage while the wrap is working. All treatments are available at East Legon, Cantonments, Community 18 and Alisa Hotel Tema."
    groups:
      - label: ""
        items:
          - name: "Intensely Cleansing Salt Scrub (Lime and Ginger)"
            desc: "A full-body exfoliation using a lime and ginger salt scrub that buffs away dead skin cells and stimulates circulation. Leaves the skin noticeably smoother, softer and more receptive to moisture."
            duration: "45 min"
            price: "GHS 460"
          - name: "Exotic Frangipani Body Nourish Wrap"
            desc: "A deeply hydrating wrap using Tahitian coconut and frangipani flower extracts. While the body is cocooned, your therapist performs a facial pressure-point massage and scalp treatment. Ideal for dry or dehydrated skin that needs conditioning and softness."
            duration: "60 min"
            price: "GHS 400"
          - name: "Body Nectar Nourish Wrap (Frangipani)"
            desc: "Intensive moisturisation for skin that feels tight or parched. A rich frangipani-based wrap envelops the body while active ingredients condition and soften. The skin feels noticeably silkier afterward."
            duration: "60 min"
            price: "GHS 450"
          - name: "Exotic Coconut Rub and Milk Ritual Wrap"
            desc: "Inspired by traditional Balinese skincare, this treatment combines coconut, mung bean, spices and lavender with Exotic Frangipani Monoi Moisture Melt to polish the skin and leave it deeply nourished. The texture and fragrance make this one of the more sensory treatments on the menu."
            duration: "60 min"
            price: "GHS 500"
          - name: "Thousand Flower Detox Wrap"
            desc: "A nutrient-rich wrap using Green Tea Balm to support the skin's natural detoxification process. Designed to encourage a lighter, more energised feeling through the body while improving skin tone and texture."
            duration: "60 min"
            price: "GHS 500"
          - name: "Cellutox Aroma Spa Ocean Wrap"
            desc: "A marine algae wrap infused with juniper and lemon that targets congestion and fluid retention. While wrapped, you receive a facial massage and scalp treatment or foot massage. The treatment is designed to improve skin texture and reduce the visible signs of cellulite over time."
            duration: "75 min"
            price: "GHS 600"
          - name: "Musclease Aroma Spa Ocean Wrap"
            desc: "A warming seaweed wrap for deep muscle relief. While cocooned, essential oils work to ease aching, overworked muscles, and a pressure-point facial massage and scalp treatment are performed. Designed for bodies that feel tight, fatigued or physically overextended."
            duration: "75 min"
            price: "GHS 600"
          - name: "Body Sculpt Cellulite and Colon Therapy"
            desc: "An Elemis body sculpting treatment that combines advanced massage techniques with a detoxifying birch and fennel body mask. Uses Elemis Body Sculpting Lipo-Refining Serum and Firming Cream to firm, tone and improve skin texture, with particular focus on areas prone to cellulite, fluid retention and sluggish circulation."
            duration: "60 min"
            price: "GHS 600"
          - name: "Targeted Toning Tightener"
            desc: "A results-focused body treatment combining massage and detoxifying clay to tone specific areas, improve circulation and firm the skin. Suited to clients who want a more active, targeted approach to body conditioning."
            duration: "75 min"
            price: "GHS 600"
          - name: "Universal Contour Wrap"
            desc: "A specialist body wrap designed to firm, tone and temporarily reduce measurements. The treatment uses a mineral-rich solution applied in targeted bandages to improve skin tone and achieve visible inch loss in a single two-hour session. Results typically last thirty days or longer. A popular choice before events or occasions."
            duration: "120 min"
            price: "GHS 600"

  - id: "beauty"
    number: "04"
    name: "Beauty"
    intro: "Brow shaping, lash treatments, tinting, threading and extensions. Quick, precise services that make a visible difference. Available at all locations unless otherwise noted."
    groups:
      - label: "Brows"
        items:
          - name: "Eyebrow Tinting"
            desc: "Semi-permanent dye applied to enhance, define and deepen brow colour."
            duration: "20 min"
            price: "GHS 100"
          - name: "Eyebrow Stain"
            desc: "A semi-permanent treatment that stains both skin and hair for a fuller, more defined brow shape. A popular alternative to traditional tinting and henna."
            duration: "15 min"
            price: "GHS 200"
          - name: "Eyebrow Lamination"
            desc: "A brow-smoothing treatment that sets hairs in place for a fuller, more groomed appearance. Particularly effective for thinning or unruly brows. No needles or colour involved."
            duration: "45 min"
            price: "GHS 300"
      - label: "Lashes"
        items:
          - name: "Eyelash Tinting"
            desc: "Semi-permanent dye applied to the lashes for a darker, fuller look without mascara. Lasts approximately four weeks."
            duration: "20 min"
            price: "GHS 100"
          - name: "Eyelash and Eyebrow Tinting"
            desc: "Combined lash and brow tinting in a single appointment for a defined, polished finish."
            duration: "30 min"
            price: "GHS 180"
          - name: "Individual Eyelash"
            desc: "Individual lash clusters applied to enhance length and volume for a natural-looking result."
            duration: "30 min"
            price: "GHS 200"
          - name: "Semi-Permanent Individual Eyelash Extensions"
            desc: "Individual extensions bonded one-to-one with your natural lashes using semi-permanent adhesive. Creates a longer, fuller lash line that lasts several weeks with proper care."
            duration: "120 min"
            price: "GHS 550"
          - name: "Eyelash Refill"
            desc: "Maintenance appointment for existing lash extensions. Replaces any lashes that have naturally shed and restores fullness."
            duration: "60 min"
            price: "GHS 400"
          - name: "Eyelash Removal"
            desc: "Professional removal of lash extensions using a gentle dissolving solution to protect your natural lashes."
            duration: "30 min"
            price: "GHS 100"
      - label: "Threading"
        items:
          - name: "Full Face Threading"
            desc: "Precise hair removal using twisted cotton thread. Covers the full face including brows, upper lip, chin and cheeks."
            duration: "45 min"
            price: "GHS 250"

