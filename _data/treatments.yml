meta_title: "Treatments — Niobe Beauty"
meta_desc: "Facials, body massage, wraps, beauty services and thermal facilities at Niobe Beauty, Accra and Tema."

hero:
  eyebrow: "Treatments"
  title: "Tailored to you,"
  title_em: "every visit"
  desc: "Every session is adapted by your therapist based on what your skin or body needs that day. We do not apply a universal protocol to every client."

intro_note: "A 100% non-refundable deposit is required for all bookings. 5% discount when two or more guests book together."

cta:
  eyebrow: "Book"
  heading: "Ready to book"
  heading_em: "a treatment?"
  desc: "Contact us to confirm availability and secure your appointment. A 100% non-refundable deposit is required."

categories:
  - id: "facials"
    number: "01"
    name: "Facials"
    intro: ""
    groups:
      - label: ""
        items:
          - name: "Elemis BIOTEC Facials"
            desc: "BIOTEC facials combine professional Elemis formulations with advanced technology including microcurrent, LED light therapy, ultrasonic peeling, galvanic current and oxygen infusion. Your therapist selects and adjusts these based on your skin's condition at the time of treatment. Available as a range of targeted treatments."
            duration: "Range of durations"
            price: "From GHS 450"
          - name: "Elemis BIOTEC Line Eraser"
            desc: "An anti-wrinkle facial using microcurrent pulses and red and blue light therapy to smooth lines and improve firmness. Targets established wrinkles with results supported by independent clinical trials."
            duration: "60 min"
            price: "GHS 450"
          - name: "Elemis BIOTEC Triple-Tec Anti-Wrinkle"
            desc: "The most advanced anti-ageing facial in the BIOTEC range. Targets both face and eye area using Padina Pavonica, African Birch Bark and Tripeptides. Microcurrent lifts and firms, light therapy supports collagen production, and oxygen infusion helps plump and smooth visible lines."
            duration: "75 min"
            price: "GHS 520"
          - name: "Million Dollar Super Facial"
            desc: "Our most advanced standalone facial treatment. Over two hours, this multi-phase protocol targets fine lines, enlarged pores, scarring, pigmentation and irregular texture using professional-grade technologies and active formulations. Results are typically visible immediately and can last four weeks or longer."
            duration: "120 min"
            price: "From GHS 700"

  - id: "massage"
    number: "02"
    name: "Body Massage"
    intro: "Our massage menu includes Elemis full-body treatments, targeted therapies and specialist techniques. Available in 60 and 90-minute formats at most locations."
    groups:
      - label: ""
        items:
          - name: "Elemis Deeper Than Deep Hot Stone Massage"
            desc: "Smooth, heated stones placed along the body and used to massage deep into the muscles, releasing tension that hands alone sometimes cannot reach. Warmed oils hydrate the skin while sustained heat softens tight areas across the back, shoulders and legs."
            duration: "60 / 90 min"
            price: "GHS 370 / 480"
          - name: "Elemis Freestyle Deep Tissue Massage"
            desc: "A firm, focused massage tailored entirely to your body. Your therapist works into the areas carrying the most tension, using deep pressure to ease knotted muscle and improve mobility. Suited to clients carrying physical strain from exercise, posture or prolonged sitting."
            duration: "60 / 90 min"
            price: "GHS 360 / 460"
          - name: "Elemis Garden of England Rose Restore Massage"
            desc: "A full-body Swedish massage using rose-infused oils. Long, flowing strokes ease tension and improve circulation. Lighter pressure than deep tissue, with a calming pace and warm floral fragrance. A good choice when the body needs to soften and slow down rather than be worked intensively."
            duration: "60 / 90 min"
            price: "GHS 340 / 440"
          - name: "Elemis Hot Mineral Body Boost Massage"
            desc: "A mineral-rich full-body massage using light to medium pressure to ease muscular discomfort, stimulate circulation and condition the skin. More energising in quality than a standard relaxation massage."
            duration: "60 / 90 min"
            price: "GHS 340 / 440"
          - name: "Elemis Peaceful Pregnancy Massage"
            desc: "Adapted specifically for pregnancy, using safe positioning and gentle pressure to relieve tension through the back, shoulders, hips, hands and feet. Available from the second trimester onward. Not suitable for clients with recent operations, undiagnosed swelling or chronic back conditions."
            duration: "75 min"
            price: "GHS 400"
          - name: "Head, Back and Neck Massage"
            desc: "Focused massage for the areas that accumulate the most tension: upper back, neck, shoulders and scalp. Effective for tightness caused by desk work, stress or poor posture."
            duration: "30 min"
            price: "GHS 300"
          - name: "Indian Head Massage"
            desc: "An Ayurvedic technique using specific pressure and massage movements across the head, neck and shoulders to release tension and promote calm. Performed seated, without oils."
            duration: "30 min"
            price: "GHS 220"
          - name: "Reflexology"
            desc: "A pressure-point therapy applied to the feet, based on the principle that specific zones on the sole correspond to different areas of the body. The 60-minute format allows for more thorough coverage and deeper work."
            duration: "30 / 60 min"
            price: "GHS 220 / 320"
          - name: "Foot Massage"
            desc: "Targeted pressure to relieve tension, improve circulation and bring a noticeable sense of ease to the lower legs and feet."
            duration: "30 min"
            price: "GHS 140"

  - id: "wraps"
    number: "03"
    name: "Body Wraps & Scrubs"
    intro: "Elemis body wraps and scrubs work on the skin's surface and below it, using marine actives, botanical ingredients and mineral-rich formulations to exfoliate, hydrate, nourish and tone. Available at East Legon, Cantonments, Community 18 and Alisa Hotel Tema."
    groups:
      - label: ""
        items:
          - name: "Intensely Cleansing Salt Scrub (Lime & Ginger)"
            desc: "A full-body exfoliation using a lime and ginger salt scrub that buffs away dead skin cells and stimulates circulation. Leaves the skin noticeably smoother, softer and more receptive to moisture."
            duration: "45 min"
            price: "GHS 460"
          - name: "Exotic Frangipani Body Nourish Wrap"
            desc: "A deeply hydrating wrap using Tahitian coconut and frangipani flower extracts. While cocooned, your therapist performs a facial pressure-point massage and scalp treatment. Ideal for dry or dehydrated skin."
            duration: "60 min"
            price: "GHS 400"
          - name: "Exotic Coconut Rub and Milk Ritual Wrap"
            desc: "Inspired by Balinese skincare, combining coconut, mung bean, spices and lavender with Exotic Frangipani Monoi Moisture Melt to polish and deeply nourish the skin. One of the more sensory treatments on the menu."
            duration: "60 min"
            price: "GHS 500"
          - name: "Thousand Flower Detox Wrap"
            desc: "A nutrient-rich wrap using Green Tea Balm to support the skin's natural detoxification process. Designed to encourage a lighter, more energised feeling while improving skin tone and texture."
            duration: "60 min"
            price: "GHS 500"
          - name: "Cellutox Aroma Spa Ocean Wrap"
            desc: "A marine algae wrap infused with juniper and lemon, targeting congestion and fluid retention. A facial massage and scalp treatment or foot massage are included while the wrap works. Designed to improve skin texture and reduce the visible signs of cellulite over time."
            duration: "75 min"
            price: "GHS 600"
          - name: "Musclease Aroma Spa Ocean Wrap"
            desc: "A warming seaweed wrap for deep muscle relief. Essential oils ease aching muscles while a pressure-point facial massage and scalp treatment are performed. Designed for bodies that feel tight, fatigued or overextended."
            duration: "75 min"
            price: "GHS 600"
          - name: "Universal Contour Wrap"
            desc: "A specialist wrap designed to firm, tone and temporarily reduce measurements. A mineral-rich solution applied in targeted bandages improves skin tone and achieves visible inch loss in a single session. Results typically last thirty days or longer."
            duration: "120 min"
            price: "GHS 600"

  - id: "thermal"
    number: "04"
    name: "Steam, Sauna & Jacuzzi"
    intro: "Thermal sessions are 20 minutes and work well before a massage or body treatment to warm and prepare the muscles. Each can be booked as a standalone or added to any treatment at a reduced rate."
    groups:
      - label: ""
        items:
          - name: "Steam"
            desc: "Wet heat opens the pores and softens the skin — a useful preparation for body treatments, scrubs or massage. Available at East Legon, Cantonments, Community 18 and Alisa Hotel Tema."
            duration: "20 min"
            price: "GHS 250 / 200 add-on"
          - name: "Sauna"
            desc: "Dry heat supports circulation and helps ease muscle tension. A good complement to any body treatment. Available at East Legon, Cantonments, Community 18 and Alisa Hotel Tema."
            duration: "20 min"
            price: "GHS 250 / 200 add-on"
          - name: "Jacuzzi"
            desc: "Warm, pressurised water loosens tight muscles and helps reduce joint discomfort. Available at East Legon and Cantonments."
            duration: "20 min"
            price: "GHS 250 / 200 add-on"

  - id: "beauty"
    number: "05"
    name: "Beauty"
    intro: "Brow shaping, lash treatments, tinting, threading and extensions. Quick, precise services that make a visible difference. Available at all locations unless otherwise noted."
    groups:
      - label: "Brows"
        items:
          - name: "Eyebrow Tinting"
            desc: "Semi-permanent dye applied to enhance, define and deepen brow colour."
            duration: "20 min"
            price: "GHS 100"
          - name: "Eyebrow Stain"
            desc: "Stains both skin and hair for a fuller, more defined brow shape. A popular alternative to traditional tinting and henna."
            duration: "15 min"
            price: "GHS 200"
          - name: "Eyebrow Lamination"
            desc: "Sets hairs in place for a fuller, more groomed appearance. Particularly effective for thinning or unruly brows."
            duration: "45 min"
            price: "GHS 300"
      - label: "Lashes"
        items:
          - name: "Eyelash Tinting"
            desc: "Semi-permanent dye for a darker, fuller lash look without mascara. Lasts approximately four weeks."
            duration: "20 min"
            price: "GHS 100"
          - name: "Semi-Permanent Individual Eyelash Extensions"
            desc: "Individual extensions bonded one-to-one with natural lashes. Creates a longer, fuller lash line lasting several weeks with proper care."
            duration: "120 min"
            price: "GHS 550"
          - name: "Eyelash Refill"
            desc: "Maintenance for existing extensions — replaces naturally shed lashes and restores fullness."
            duration: "60 min"
            price: "GHS 400"
          - name: "Eyelash Removal"
            desc: "Professional removal using a gentle dissolving solution to protect natural lashes."
            duration: "30 min"
            price: "GHS 100"
      - label: "Threading"
        items:
          - name: "Full Face Threading"
            desc: "Precise hair removal using twisted cotton thread. Covers the full face including brows, upper lip, chin and cheeks."
            duration: "45 min"
            price: "GHS 250"
