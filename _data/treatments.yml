  - id: "nails"
    number: "06"
    name: "Nails"
    intro: "From a quick gel polish to a full acrylic set, paraffin treatment or Elemis foot ritual, our nail menu covers everything from maintenance to occasion-ready finishing. All services use professional products including OPI, Shellac and Elemis, applied by trained nail technicians."
    groups:
      - label: "Manicures"
        items:
          - name: "Mini Manicure"
            desc: "A quick, clean finish. Nails are filed and shaped, cuticles tidied and hands moisturised. Ideal for regular upkeep between full manicures."
            duration: "30 min"
            price: "GHS 80"
          - name: "Spa Manicure"
            desc: "Our standard manicure with a longer, more thorough approach. Includes soak, cuticle care, filing, hand massage and polish application."
            duration: "45 min"
            price: "GHS 100"
          - name: "Hot Oil Treatment Manicure"
            desc: "A nourishing manicure that uses warm oil to soften cuticles, condition dry nails and hydrate the hands. Particularly effective for brittle or dehydrated nails."
            duration: "30 min"
            price: "GHS 150"
          - name: "Paraffin Wax Manicure"
            desc: "Warm paraffin wax is applied to the hands to soften dry or cracked skin, draw out impurities and improve moisture levels. Leaves hands noticeably smoother and more supple."
            duration: "45 min"
            price: "GHS 140"
          - name: "Garden of England Rose Restored Hand Treatment with Manicure"
            desc: "An Elemis conditioning hand treatment with anti-ageing benefits. Rose-infused formulations soften, hydrate and help restore suppleness to the hands and nails. Includes a full manicure."
            duration: "60 min"
            price: "GHS 150"
          - name: "Manicure and Gel Polish"
            desc: "A full spa manicure finished with long-wearing gel polish for a chip-resistant, high-shine result that lasts up to two weeks."
            duration: "60 min"
            price: "GHS 170"
          - name: "Spa Manicure and Pedicure Combo"
            desc: "Both hands and feet receive the full spa treatment in a single session. Includes soak, cuticle care, filing, massage and polish for a complete, well-groomed finish."
            duration: "75 min"
            price: "GHS 220"
          - name: "Nail Polish — Hands and Feet"
            desc: "Polish application on both hands and feet. A quick finish when nails are already shaped and maintained."
            duration: "30 min"
            price: "GHS 130"
      - label: "Pedicures"
