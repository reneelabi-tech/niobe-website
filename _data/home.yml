meta_title: "Niobe Beauty — Spa & Salon, Accra & Tema"
meta_desc: "Award-winning spa and salon across Accra and Tema. Five locations. One standard."

announce:
  announce_text: "Easter Packages now available —"
  announce_link_text: "View packages"
  announce_link_url: "packages.html"

hero:
  eyebrow: "Award-winning spa & salon"
  title_1: "Niobe Beauty."
  title_2: "Five Locations."
  title_em: "One Standard."
  subtitle: "Award-winning spa and salon across Accra and Tema. Over twenty years of expert care."

intro:
  quote_1: "Not just a spa."
  quote_2: "A standard of care"
  quote_em: "you can rely on."
  para_1: "Niobe Beauty has been one of Ghana's leading spa and salon destinations for over two decades. Across five locations in Accra and Tema, we offer a consistently high standard of treatment, technique and attention."
  para_2: "We work with Elemis — one of the world's most respected professional skincare brands — alongside a full menu of body treatments, hammam ceremonies, beauty services and thermal facilities. Every session is tailored to the individual."

categories_section:
  eyebrow: "Treatments"
  heading: "What we offer"
  categories:
    - number: "01"
      name: "Facials"
      detail: "Elemis BIOTEC technology facials, the Million Dollar Super Facial and a full range of skin-specific treatments. Available at all five locations."
      link_text: "View facials"
      link_url: "treatments.html#facials"
    - number: "02"
      name: "Body Massage"
      detail: "Elemis full-body treatments, deep tissue, hot stone, Swedish, reflexology and specialist therapies. Available in 60 and 90-minute formats."
      link_text: "View massages"
      link_url: "treatments.html#massage"
    - number: "03"
      name: "Body Wraps & Scrubs"
      detail: "Marine, botanical and mineral wraps using Elemis formulations. Exfoliation, detox and deep nourishment for the body. Available at four locations."
      link_text: "View wraps & scrubs"
      link_url: "treatments.html#wraps"
    - number: "04"
      name: "Hammam Ceremonies"
      detail: "Traditional Turkish bath rituals from the foundational hammam experience through to the full Thousand and One Night ceremony."
      link_text: "View ceremonies"
      link_url: "packages.html#signature"
    - number: "05"
      name: "Nails & Beauty"
      detail: "Manicures, pedicures, brow shaping, lash treatments, tinting, threading and extensions. Available at all five locations."
      link_text: "View beauty services"
      link_url: "treatments.html#beauty"
    - number: "06"
      name: "Thermal Facilities"
      detail: "Steam rooms, saunas and jacuzzis available as standalone sessions or added to any treatment at a reduced rate. 20-minute sessions."
      link_text: "View facilities"
      link_url: "treatments.html#thermal"

packages_section:
  eyebrow: "Spa Packages"
  heading: "A selection of"
  heading_em: "our packages"
  featured:
    - tag: "Elemis · 3+ hours"
      name: "Elemis Bliss Package"
      desc: "Our most comprehensive single-session Elemis experience. A Salt Glow, steam and jacuzzi, Deep Tissue Massage, Touch Anti-Ageing Facial, Pro-Radiance hand treatment with manicure, and Sole Delight pedicure. Thorough without feeling rushed."
      duration: "3 hours +"
    - tag: "Spa Journey · 5+ hours"
      name: "Niobe Spa Escape Journey"
      desc: "Our longest, most expansive offering. Over five hours of reflexology, steam, body scrub, head and neck massage, full Rose Restore Massage, Elemis facial, hand treatment with manicure, and Sole Delight pedicure. Nothing is rushed; nothing is missed."
      duration: "5 hours +"
    - tag: "Hammam Ceremony"
      name: "Hammam Thousand & One Night"
      desc: "The most elaborate of our hammam ceremonies. Steam, aromatic alum stone scrub, mineral-rich clay wrap and a full facial — each stage building on the one before. Skin that feels clarified, smoother and more refined."
      duration: "Full ceremony"

why:
  eyebrow: "Over twenty years"
  number_display: "20+"
  feature_text: "Years of expertise across Accra and Tema."
  award_tags:
    - "Award-winning spa and salon"
    - "Certified Elemis partner"
    - "Five locations across Greater Accra"
    - "5% group discount for two or more guests"
  heading: "Why choose Niobe"
  items:
    - number: "01"
      title: "Consistent quality, every location"
      body: "The same standard of treatment whether you visit East Legon, Cantonments or Tema."
    - number: "02"
      title: "Professional Elemis products throughout"
      body: "We use Elemis professional formulations across our spa treatments and facials — not available in general retail."
    - number: "03"
      title: "Tailored to you, every visit"
      body: "Pressure, technique and products are adapted at each session. We do not apply a fixed protocol to every client."
    - number: "04"
      title: "Hammam & thermal facilities"
      body: "Steam rooms, saunas, jacuzzis and a full hammam menu — rare at this level in Accra."

gift_cards:
  eyebrow: "Gift Cards"
  heading: "Give the gift of"
  heading_em: "expert care"
  desc: "A Niobe gift card can be redeemed against any service, package or product across all five locations. Available from GHS 100, with no upper limit. Valid for 90 days from purchase."

cta:
  eyebrow: "Ready to visit"
  title_1: "Five locations."
  title_em: "Book any of them."
  sub: "East Legon · Cantonments · Community 18 · Alisa Hotel Tema. A 100% non-refundable deposit is required to secure your appointment."
