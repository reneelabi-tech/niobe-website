approach:
  eyebrow: "How we work"
  heading: "What we hold"
  heading_em: "to, consistently"
  values:
    - title: "Adapted, not prescribed"
      body: "Every session begins with an assessment of what the skin or body needs that day. We do not apply a fixed protocol to every client. Pressure, products and technique are adjusted at each visit."
    - title: "Professional products throughout"
      body: "We work exclusively with Elemis professional formulations — not available in general retail. The difference is in the concentration of actives and the clinical backing behind the results."
    - title: "The same standard, every location"
      body: "Five locations across Greater Accra, each one maintained to the same operational and treatment standard. The experience at Cantonments is the same quality as the one at Alisa Hotel Tema."
    - title: "Comprehensive, not fragmented"
      body: "Facials, body treatments, hammam, thermal facilities, nails, beauty, hair removal and products — all in one place. You should not need to go elsewhere."

before_visit:
  heading: "Before you visit"
  items:
    - title: "Booking in advance"
      body: "We recommend booking in advance to secure your preferred time and treatment. While extras can often be added on the day, the best way to ensure everything is available is to call ahead and book your full appointment."
    - title: "Arrival"
      body: "Please arrive at reception at least fifteen minutes before your appointment. This allows time for a brief consultation and for you to be shown to your locker, where a bathrobe, slippers and towels will be provided. Late arrivals may result in a shortened treatment time."
    - title: "Spa etiquette"
      body: "Our spa is a shared space. Please switch mobile phones to silent before entering and store them in your locker. Smoking is not permitted on the premises, and outside food and drinks may not be brought in. Louder conversation should be kept to the lounge areas so that other guests can rest undisturbed."
    - title: "What to bring"
      body: "Bring any gift vouchers or booking confirmation for check-in. Robes, disposable underwear, head coverings and towels are provided. You are welcome to bring your own swimwear or flip-flops if you prefer. All personal belongings can be stored securely in your locker."
    - title: "Deposit & group bookings"
      body: "A 100% non-refundable deposit is required for all bookings. A 5% discount applies when two or more guests book together — please let us know when making your enquiry."

cta:
  eyebrow: "Visit us"
  title: "Five locations."
  title_em: "Ready when you are."
