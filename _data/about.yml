approach:
  eyebrow: "How we work"
  heading: "What we hold"
  heading_em: "to, consistently"
  values:
    - title: "Adapted, not prescribed"
      body: "Every session begins with an assessment of what the skin or body needs that day. We do not apply a fixed protocol to every client. Pressure, products and technique are adjusted at each visit."
    - title: "Professional products throughout"
      body: "We work exclusively with Elemis professional formulations — not available in general retail. The difference is in the concentration of actives and the clinical backing behind the results."
    - title: "The same standard, every location"
      body: "Five locations across Greater Accra, each one maintained to the same operational and treatment standard. The experience at Cantonments is the same quality as the one at Alisa Hotel Tema."
    - title: "Comprehensive, not fragmented"
      body: "Facials, body treatments, hammam, thermal facilities, nails, beauty, hair removal and products — all in one place. You should not need to go elsewhere."

before_visit:
  heading: "Before you visit"
  items:
    - title: "Booking & deposit"
      body: "A 100% non-refundable deposit is required for all bookings. This secures your appointment time and covers preparation by your therapist. We are unable to hold appointment slots without a confirmed deposit."
    - title: "Group & couple bookings"
      body: "A 5% discount applies when two or more guests book together. This applies across most treatments and packages. Please let us know when making your enquiry."
    - title: "Pregnancy treatments"
      body: "Our Elemis Peaceful Pregnancy Massage is adapted for pregnancy from the second trimester onward. Please inform us when booking. Certain treatments are not suitable during pregnancy — our team will advise."
    - title: "What to expect"
      body: "Your therapist will discuss your preferences and any areas of concern at the start of your session. You do not need to prepare anything in advance — just arrive at the agreed time."

cta:
