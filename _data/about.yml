meta_title: "About — Niobe Beauty"
meta_desc: "Over twenty years of expert spa and salon care across Accra and Tema. The story behind Niobe Beauty."

hero:
  eyebrow: "About Niobe Beauty"
  title: "Over twenty years"
  title_em: "of expert care"
  desc: "Award-winning spa and salon across Accra and Tema. Five locations. One standard."

story:
  eyebrow: "Our Story"
  title: "Founded on a"
  title_2: "straightforward"
  title_em: "idea"
  paragraphs:
    - "Niobe Beauty was founded on a straightforward idea: that personal care, done well, should be one of the most reliable parts of your routine. Not rushed, not impersonal, not left to chance."
    - "From a single salon, we have grown to five locations across Accra and Tema — East Legon, Cantonments, Community 18, African Regent Hotel and Alisa Hotel Tema — each staffed by trained therapists and aestheticians who understand skin, muscle and the importance of getting the details right. Our treatments are built around professional-grade products from Elemis, Murad and other respected brands, and every service follows a consistent standard regardless of which branch you visit."
    - "We invest continuously in training and technique. Our therapists are educated in the latest Elemis and BIOTEC protocols, CACI technology, advanced peels and specialist bodywork. That ongoing commitment to skill is what allows us to offer a menu that ranges from a thirty-minute booster facial to a five-hour spa journey, and to deliver each one with the same level of care."
    - "Niobe is a World Luxury Spa Award winner, but what matters more to us is that you leave feeling genuinely better than when you arrived. That is the standard we hold ourselves to, every day, at every location."

