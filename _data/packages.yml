meta_title: "Spa Packages — Niobe Beauty"
meta_desc: "Elemis and signature spa packages at Niobe Beauty, Accra and Tema. Carefully sequenced combinations across multiple treatments."

hero:
  eyebrow: "Spa Packages"
  title: "Carefully"
  title_em: "sequenced care"
  desc: "Our packages combine treatments into a single session, structured so each stage prepares the body for the next. Every package includes refreshments."

deposit_bar: "100% deposit required to secure all bookings"

intro_note: "A 100% non-refundable deposit is required for all bookings. 5% discount when two or more guests book together."

cta:
  eyebrow: "Book"
  heading: "Ready to book"
  heading_em: "a package?"
  desc: "Contact us to confirm availability and secure your appointment. A 100% non-refundable deposit is required. Every package includes refreshments."

sections:
  - id: "elemis"
    number: "01"
    title: "Elemis Packages"
    intro: "Niobe is a certified Elemis partner. These packages use authentic Elemis formulations and professionally trained therapists — combining clinical-grade actives with hands-on technique."
    subsections:
      - label: "Couture Rituals"
        packages:
          - name: "Elemis Couture Touch"
            duration: "60 min"
            price: "GHS —"
            desc: "A focused pairing for when an hour is all you have but a reset is needed. Your therapist selects either a Freestyle Deep Tissue Massage or Deeper than Deep Hot Stone Massage based on where your body is holding strain, working through areas of built-up tension before transitioning to an Elemis hands-on Touch facial. Pressure, products and technique are adapted to your skin's condition that day. Shoulders sit lower, the complexion looks clearer and hydrated, and the mind feels noticeably quieter. Refreshments included."
            availability: "East Legon · Cantonments · Community 18 · African Regent Hotel · Alisa Hotel Tema"
          - name: "Elemis Couture Technology Biotec"
            duration: "120 min"
            price: "GHS —"
            desc: "The full two-hour expression of our technology-led facial and massage pairing. With double the time, the BIOTEC facial can be adapted more thoroughly across different areas of concern, allowing your therapist to use the most suitable combination of technology and hands-on work for your skin. The massage portion moves at a slower, more deliberate pace through the body. This is the session for anyone who wants clinical-level skin results alongside genuine physical release. You finish with skin that looks fresher and a body that feels noticeably lighter. Refreshments included."
            availability: "East Legon · Cantonments · Community 18 · African Regent Hotel · Alisa Hotel Tema"
      - label: "Elemis Programmes"
        packages:
          - name: "Elemis Recharge Package"
            duration: "Multi-treatment"
            price: "GHS —"
            desc: "For skin and body that both feel flat, dull or overdue for attention. An Elemis Exotic Lime and Ginger Salt Glow opens the session, the citrus and spice working across the skin to clear dead cells and stimulate circulation, followed by a massage that brings warmth and movement back into sluggish muscles. An Elemis BIOTEC facial then addresses the complexion, selected for your skin type and using technology to improve clarity, firmness and brightness where it is needed most. Together, the treatments bring clarity to the complexion and more energy back into the body. Refreshments included."
            availability: "East Legon · Cantonments · Community 18 · Alisa Hotel Tema"
          - name: "Elemis Renew Package"
            duration: "Extended session"
            price: "GHS —"
            desc: "A longer, more immersive session that begins beneath the skin and works outward. The Elemis Cellutox Aroma Spa Ocean Wrap draws on marine actives and essential oils to encourage a lighter, less congested feeling through the body while easing surface tension and heaviness. While the wrap works, the treatment transitions into a fifty-minute massage that deepens the process, loosening the muscles as the body softens. An Elemis Touch Anti-Ageing Facial, selected for your skin type, brings the same attention to the complexion. You leave with a lighter body and a complexion that appears calmer and more refined. Refreshments included."
            availability: "East Legon · Cantonments · Community 18 · Alisa Hotel Tema"
          - name: "Elemis Bliss Package"
            duration: "3 hours +"
            price: "GHS —"
            desc: "Our most comprehensive single-session Elemis experience, spanning over three hours. An Elemis Lime and Ginger Salt Glow buffs away dullness and primes the skin before a steam and jacuzzi open everything up. An Elemis Freestyle Deep Tissue Massage addresses the body's deeper tension, followed by an Elemis Touch Anti-Ageing Facial tailored to your skin type. Hands are refined with an Elemis Pro-Radiance treatment and manicure, while an Elemis Sole Delight foot treatment and pedicure complete the attention. The experience is comprehensive without feeling rushed. You leave with noticeably softer skin and a fuller sense of having been properly looked after. Refreshments included."
            availability: "East Legon · Cantonments"
          - name: "Elemis Body Detox Package"
            duration: "Course recommended"
            price: "GHS —"
            desc: "Designed for areas of the body that feel congested, heavy or in need of more targeted attention, this Elemis treatment takes a more active, results-focused approach than a traditional relaxation session. The techniques used are intended to stimulate circulation, support skin tone and improve the appearance of texture through consistent treatment. It is a strong option for clients looking for a more purposeful body treatment with visible upkeep in mind. Best experienced as a course: two treatments per week for one month, then monthly for maintenance. Refreshments included."
            availability: "East Legon · Cantonments · Community 18 · Alisa Hotel Tema"
          - name: "Elemis Beautiful Bride Package"
            duration: "Pre-wedding"
            price: "GHS —"
            desc: "Designed for the days leading up to the wedding, when everything needs to feel ready. The session opens with an Elemis Garden of England Rose Restore Massage, gentle, fragrant and calming, followed by an Elemis Sensitive Skin Soother Facial that quiets any redness or reactivity without overwhelming the skin. An Elemis Garden of England Rose Restore Hand Treatment leaves fingers soft and polished, and an Elemis Best Foot Forward Pedicure ensures every detail is considered. The pace is measured throughout. You leave looking fresh and radiant, with the skin supported rather than overstimulated. Refreshments included."
            availability: "East Legon · Cantonments · Community 18 · African Regent Hotel · Alisa Hotel Tema"
          - name: "Elemis Peaceful Pregnancy Package"
            duration: "Antenatal"
            price: "GHS —"
            desc: "Thoughtfully adapted for the changing body. The session begins with an Elemis Peaceful Pregnancy Massage, using positioning and pressure that are safe and comfortable at every stage, easing the kinds of discomfort pregnancy often brings, particularly through the lower back, hips and legs. An Elemis Superfood Pro-Radiance Facial follows, using nutrient-rich formulations to address the dullness and sensitivity that hormonal shifts often cause. An Elemis Best Foot Forward Pedicure closes with careful attention to feet that have been bearing more weight than usual. The entire session is designed to feel supportive, comfortable and appropriate to this stage. Refreshments included."
            availability: "East Legon · Cantonments · Community 18 · African Regent Hotel · Alisa Hotel Tema"
          - name: "Elemis Love Package — Solo"
            duration: "For one"
            price: "GHS —"
            desc: "A solo version of our Love Package, designed for one person to enjoy the full shape of the experience at their own pace. You choose your preferred Elemis massage and your therapist tailors the pressure and focus to where your body needs it most, whether that is the back, shoulders or legs. An Elemis Sole Delight foot treatment follows, bringing warmth and relief to the soles and arches. The result is a session that feels complete, balanced and quietly restorative. Refreshments included."
            availability: "East Legon · Cantonments · Community 18 · African Regent Hotel · Alisa Hotel Tema"
          - name: "Elemis Love Package — For Two"
            duration: "For two"
            price: "GHS —"
            desc: "Designed for two, this session allows both guests to experience the treatment together in the same space. Each of you chooses your preferred Elemis massage, whether deep tissue, hot stone or Swedish, and your therapists work in parallel, tailoring pressure and focus to each person individually. An Elemis Sole Delight foot treatment follows for both, bringing attention and warmth to an area that rarely receives it. The session is unhurried and synchronised. You leave feeling lighter, calmer and more in step with one another. Refreshments included."
            availability: "East Legon · Cantonments"

  - id: "signature"
    number: "02"
    title: "Niobe Signature Packages"
    intro: "Developed in-house and refined over many years. These packages reflect what works — carefully sequenced combinations that achieve results no single treatment can replicate alone."
    packages:
      - name: "Time Out Package"
        duration: "Massage + grooming"
        price: "GHS —"
        desc: "A gentle, uncomplicated session that pairs bodywork with grooming. A forty-five-minute Elemis Garden of England Rose Restore Massage, a Swedish-style treatment using rose-infused oils, warms and loosens the muscles with long, flowing strokes across the back, arms and legs. A manicure and pedicure follow, bringing clean, polished results to hands and feet. The rose oil leaves a light, natural fragrance on the skin that lingers after you dress. A strong choice for anyone wanting visible upkeep and lighter muscles in a manageable timeframe. Refreshments included."
        availability: "East Legon · Cantonments · Community 18 · African Regent Hotel · Alisa Hotel Tema"
      - name: "Indulge Package"
        duration: "Generous session"
        price: "GHS —"
        desc: "A generous, unhurried session that wraps the body in attention from shoulders to fingertips. An Elemis Exotic Frangipani Body Nourish Wrap envelops the skin in warm, fragrant moisture while the active ingredients soften and condition. A head, back and neck massage follows, easing the areas where stress collects most stubbornly. The session then shifts to a spa manicure and pedicure, slower and more detailed than a standard finish. The result is softer skin and a strong sense of having been given time and care, with hands and feet that look immaculate. Refreshments included."
        availability: "East Legon · Cantonments · Community 18 · Alisa Hotel Tema"
      - name: "Relax Package"
        duration: "2 hours"
        price: "GHS —"
        desc: "A balanced two-hour session for anyone who wants bodywork, skincare and finishing detail in one appointment. Your sixty-minute Elemis massage is selected to suit what the body needs most, whether that is deeper pressure through tight muscles or a gentler approach for general fatigue. A thirty-minute facial follows, chosen for your skin type to restore hydration, clarity or brightness, before a spa manicure adds a polished final touch. The overall effect is composed rather than hurried, with visible results across more than one area. Refreshments included."
        availability: "East Legon · Cantonments · Community 18 · African Regent Hotel · Alisa Hotel Tema"
      - name: "Spa Alone Treat"
        duration: "Solo · extended"
        price: "GHS —"
        desc: "A solo spa session created for anyone wanting extended time and thorough care. A steam and jacuzzi session opens the body and quiets the mind. An Elemis Booster Facial addresses the skin's most immediate needs, whether that is dehydration, dullness or lack of clarity, before a sixty-minute Elemis Deeper Than Deep Stone Massage uses heated stones to ease tightness through the back, shoulders and limbs with steady, penetrating warmth. A spa pedicure brings the final touch. The session has a natural arc from opening up to winding down, and the overall feeling is one of having been thoroughly attended to. Refreshments included."
        availability: "East Legon · Cantonments"
      - name: "Spa Together"
        duration: "For two"
        price: "GHS —"
        desc: "The same carefully structured session as the Spa Alone Treat, experienced side by side. Steam and jacuzzi open things up for both of you simultaneously. An Elemis Booster Facial addresses each person's skin individually, followed by a sixty-minute Elemis Deeper Than Deep Stone Massage where heated stones work through tension in parallel. A spa pedicure closes the session for both. Sharing the session in the same space gives the treatment a calm, companionable quality, and you leave together feeling equally cared for. Refreshments included."
        availability: "East Legon · Cantonments"
      - name: "Hammam Ritual Package"
        duration: "Traditional ceremony"
        price: "GHS —"
        desc: "The foundational hammam experience in its most traditional form. Warm steam softens the skin and opens the pores, preparing the body for a black soap scrub that works away impurities and dead cells with firm, sweeping strokes. A mineral-rich ghassoul clay wrap follows, drawing out congestion while feeding the skin with natural minerals from the Atlas Mountains. A massage closes the session, working into muscles that are now warm and pliant. The skin feels remarkably clean and smooth, and the body settles into a deep sense of ease."
        availability: "East Legon · Cantonments"
      - name: "Hammam Turkish Bath Ceremony"
        duration: "Turkish ceremony"
        price: "GHS —"
        desc: "Inspired by the ritual of the Turkish hammam, this ceremony centres on the distinctive foaming cleanse that defines the tradition. After steam opens the pores and a black soap scrub removes surface impurities, a thick, billowing foam is worked across the body in long, rhythmic movements, a sensation that is both cleansing and calming. A massage closes the ceremony, easing away any remaining tightness. The skin feels impossibly smooth, leaving the body looser and lighter overall."
        availability: "East Legon · Cantonments"
      - name: "Hammam Thousand and One Night"
        duration: "Full ceremony"
        price: "GHS —"
        desc: "The most elaborate of the hammam ceremonies, spanning multiple stages of cleansing, mineralisation and skin refinement. Steam gives way to an aromatic alum stone scrub, firmer and more invigorating than black soap, which purifies and tightens the pores. A mineral-rich clay wrap then saturates the skin with nourishing elements, preparing the complexion for a full facial that balances clarity with softness. Each stage builds on the one before. The result is skin that feels clarified, smoother and more refined."
        availability: "East Legon · Cantonments"

  - id: "rituals"
    number: "03"
    title: "Full Day Rituals"
    intro: "Longer, more layered sessions designed for an unhurried day at the spa. Each follows a deliberate arc — opening, treating, restoring — with no stage shortened or rushed."
    packages:
      - name: "The Ultimate Spa Escape"
        duration: "3.5 hours"
        price: "GHS —"
        desc: "A three-and-a-half-hour journey that moves through every layer: skin, muscle and mind. A thirty-minute Elemis facial, chosen for your skin type, clears and prepares the complexion. Steam or sauna opens the body before a sixty-minute Elemis Deeper Than Deep Hot Stone Massage works heated stones into the back, legs and shoulders with slow, deliberate pressure. A sixty-minute Elemis Thousand Flower Detox Wrap then draws out impurities while feeding the skin with botanical actives. The session closes with a sixty-minute Paraffin Spa Pedicure, warm, thorough and beautifully finishing. You leave with a clearer complexion, softer muscles and a slower internal pace. Refreshments included."
        availability: "East Legon · Cantonments"
      - name: "Serenity Package"
        duration: "Close to 5 hours"
        price: "GHS —"
        desc: "Close to five hours of layered, continuous care. A foot massage and steam or sauna session ease you in gently. A forty-five-minute Elemis Garden of England Rose Restore Massage warms and loosens the muscles before an Elemis Exotic Coconut Rub and Milk Ritual Wrap saturates the skin with rich, nourishing moisture. An Elemis facial tailored to your skin type follows, then a forty-five-minute Elemis Lava Shell Massage, the heated shells radiating warmth deep into tissue that is already softened and receptive. A spa manicure and pedicure bring everything to an immaculate close. By the end, the effect is substantial: a body that feels genuinely reset and skin that looks notably well cared for. Refreshments included."
        availability: "East Legon · Cantonments"
      - name: "Niobe Spa Escape Journey"
        duration: "5 hours +"
        price: "GHS —"
        desc: "Our longest and most expansive offering, over five hours of continuous, carefully sequenced care. The journey opens with reflexology, grounding the body through the feet, before steam prepares the skin for an Elemis body scrub that clears and brightens. A head, back and neck massage loosens the upper body, followed by a full Elemis Garden of England Rose Restore Massage that works through every remaining area of holding. An Elemis facial, chosen for your skin type, brings the same depth of attention to the complexion. The session closes with an Elemis Garden of England Rose Restore Hand Treatment with manicure and an Elemis Sole Delight Foot Treatment with pedicure. Nothing is rushed, nothing is missed. You leave physically lighter, visibly brighter and far more settled than when you came in, with a sense of calm that lingers beyond the appointment. Refreshments included."
        availability: "East Legon · Cantonments"
