meta_title: "Spa Packages — Niobe Beauty"
meta_desc: "Elemis and signature spa packages at Niobe Beauty, Accra and Tema. Carefully sequenced combinations across multiple treatments."

hero:
  eyebrow: "Spa Packages"
  title: "Carefully"
  title_em: "sequenced care"
  desc: "Our packages combine treatments into a single session, structured so each stage prepares the body for the next. Every package includes refreshments."

deposit_bar: "100% deposit required to secure all bookings"

intro_note: "A 100% non-refundable deposit is required for all bookings. 5% discount when two or more guests book together."

cta:
  eyebrow: "Book"
  heading: "Ready to book"
  heading_em: "a package?"
  desc: "Contact us to confirm availability and secure your appointment. A 100% non-refundable deposit is required. Every package includes refreshments."

sections:
  - id: "elemis"
    number: "01"
    title: "Elemis Packages"
    intro: "Niobe is a certified Elemis partner. These packages use authentic Elemis formulations and professionally trained therapists — combining clinical-grade actives with hands-on technique."
    subsections:
      - label: "Couture Rituals"
        packages:
          - name: "Elemis Couture Touch"
            duration: "60 min"
            price: "GHS —"
            desc: "Massage and facial in a single focused hour. Your therapist selects Deep Tissue or Hot Stone massage based on where the body is holding strain, then transitions to an Elemis hands-on Touch facial calibrated to your skin on the day. Shoulders sit lower, the complexion looks clearer."
            availability: "East Legon · Cantonments · Community 18 · Alisa Hotel Tema"
          - name: "Elemis Couture Technology Biotec"
            duration: "120 min"
            price: "GHS —"
            desc: "The full two-hour version of the Couture pairing — a BIOTEC technology facial addressing multiple skin concerns alongside a thorough full-body massage at a more deliberate pace. Clinical-level skin results with genuine physical release."
            availability: "East Legon · Cantonments · Community 18 · Alisa Hotel Tema"
      - label: "Elemis Programmes"
        packages:
          - name: "Elemis Recharge Package"
            duration: "Multi-treatment"
            price: "GHS —"
            desc: "Lime and ginger salt glow, massage and BIOTEC facial in sequence. Addresses dullness in the body and in the complexion together — clarity and more energy in a single appointment."
            availability: "East Legon · Cantonments · Community 18 · Alisa Hotel Tema"
          - name: "Elemis Renew Package"
            duration: "Extended session"
            price: "GHS —"
            desc: "Cellutox Ocean Wrap, a fifty-minute massage and a Touch anti-ageing facial in layered sequence. A lighter body and a complexion that appears calmer and more refined."
            availability: "East Legon · Cantonments · Community 18 · Alisa Hotel Tema"
          - name: "Elemis Bliss Package"
            duration: "3 hours +"
            price: "GHS —"
            desc: "Salt glow, steam, jacuzzi, deep tissue massage, facial, hand treatment and pedicure. Our most comprehensive single-session Elemis experience — noticeably softer skin, a fuller sense of having been properly looked after."
            availability: "East Legon · Cantonments"
          - name: "Elemis Body Detox Package"
            duration: "Course recommended"
            price: "GHS —"
            desc: "A targeted body treatment to stimulate circulation, improve skin tone and reduce visible congestion. Results-focused rather than relaxation-led. Best experienced as a course: twice weekly for one month, then monthly for maintenance."
            availability: "East Legon · Cantonments · Community 18 · Alisa Hotel Tema"
          - name: "Elemis Beautiful Bride Package"
            duration: "Pre-wedding"
            price: "GHS —"
            desc: "Rose restore massage, sensitive skin soother facial, rose hand treatment and pedicure. Calibrated for calm and radiance in the days before the wedding — supportive rather than overstimulating."
            availability: "East Legon · Cantonments · Community 18 · Alisa Hotel Tema"
          - name: "Elemis Peaceful Pregnancy Package"
            duration: "Antenatal"
            price: "GHS —"
            desc: "Pregnancy massage using safe positioning, a nourishing Superfood facial and a careful pedicure. Adapted for the changing body from the second trimester onward — comfortable and appropriate throughout."
            availability: "East Legon · Cantonments · Community 18 · Alisa Hotel Tema"
          - name: "Elemis Love Package — Solo"
            duration: "For one"
            price: "GHS —"
            desc: "Chosen Elemis massage, tailored to where the body needs it most, followed by a Sole Delight foot treatment. Unhurried and complete. A solo version of the Love Package at its fullest."
            availability: "East Legon · Cantonments · Community 18 · Alisa Hotel Tema"
          - name: "Elemis Love Package — For Two"
            duration: "For two"
            price: "GHS —"
            desc: "Simultaneous Elemis massages and Sole Delight foot treatments for two guests in the same space, each therapist working to the individual. Unhurried, synchronised and quietly restorative."
            availability: "East Legon · Cantonments"

  - id: "signature"
    number: "02"
    title: "Niobe Signature Packages"
    intro: "Developed in-house and refined over many years. These packages reflect what works — carefully sequenced combinations that achieve results no single treatment can replicate alone."
    packages:
      - name: "Time Out Package"
        duration: "Massage + grooming"
        price: "GHS —"
        desc: "A rose oil Swedish massage — long, flowing strokes across back, arms and legs — followed by a manicure and pedicure. Lighter muscles and polished hands and feet in a manageable timeframe."
        availability: "East Legon · Cantonments · Community 18 · Alisa Hotel Tema"
      - name: "Indulge Package"
        duration: "Generous session"
        price: "GHS —"
        desc: "Frangipani body wrap, head and neck massage, spa manicure and pedicure in an unhurried sequence. Softer skin and a strong sense of having been given time and care — hands and feet that look immaculate."
        availability: "East Legon · Cantonments · Community 18 · Alisa Hotel Tema"
      - name: "Relax Package"
        duration: "2 hours"
        price: "GHS —"
        desc: "Sixty-minute Elemis massage, thirty-minute facial and spa manicure. Bodywork, skincare and finishing detail in one composed appointment. Visible results across more than one area."
        availability: "East Legon · Cantonments · Community 18 · Alisa Hotel Tema"
      - name: "Spa Alone Treat"
        duration: "Solo · extended"
        price: "GHS —"
        desc: "Steam, jacuzzi, Elemis booster facial, deeper than deep hot stone massage and spa pedicure. A natural arc from opening up to winding down, designed for solo guests wanting thorough, uninterrupted care."
        availability: "East Legon · Cantonments"
      - name: "Spa Together"
        duration: "For two"
        price: "GHS —"
        desc: "The same Spa Alone Treat experienced simultaneously side by side. Steam, jacuzzi, facial, hot stone massage and pedicure — equally for both guests. Calm, companionable and complete."
        availability: "East Legon · Cantonments"
      - name: "Hammam Ritual Package"
        duration: "Traditional ceremony"
        price: "GHS —"
        desc: "Steam, black soap scrub, ghassoul clay wrap and massage in the traditional hammam sequence. The skin leaves remarkably clean and smooth; the body settles into a deep sense of ease."
        availability: "East Legon · Cantonments"
      - name: "Hammam Turkish Bath Ceremony"
        duration: "Turkish ceremony"
        price: "GHS —"
        desc: "Steam, black soap scrub and a thick billowing foam worked across the body in long, rhythmic movements. Closed with massage. The skin feels impossibly smooth, the body looser and lighter overall."
        availability: "East Legon · Cantonments"
      - name: "Hammam Thousand and One Night"
        duration: "Full ceremony"
        price: "GHS —"
        desc: "Aromatic alum stone scrub, mineral clay wrap, full facial and massage across multiple stages. The most elaborate of the hammam ceremonies — skin clarified, smoother and more refined."
        availability: "East Legon · Cantonments"

  - id: "rituals"
    number: "03"
    title: "Full Day Rituals"
    intro: "Longer, more layered sessions designed for an unhurried day at the spa. Each follows a deliberate arc — opening, treating, restoring — with no stage shortened or rushed."
    packages:
      - name: "The Ultimate Spa Escape"
        duration: "3.5 hours"
        price: "GHS —"
        desc: "Elemis facial, steam or sauna, deeper than deep hot stone massage, thousand flower detox wrap and paraffin pedicure in sequence. A clearer complexion, softer muscles and a slower internal pace."
        availability: "East Legon · Cantonments"
      - name: "Serenity Package"
        duration: "Close to 5 hours"
        price: "GHS —"
        desc: "Foot massage, steam, rose oil massage, exotic coconut wrap, tailored facial, lava shell massage, manicure and pedicure. Close to five hours of layered, continuous care — a body genuinely reset and skin that looks notably well cared for."
        availability: "East Legon · Cantonments"
      - name: "Niobe Spa Escape Journey"
        duration: "5 hours +"
        price: "GHS —"
        desc: "Reflexology, steam, body scrub, head and neck massage, full rose oil massage, facial, hand treatment and pedicure — nothing rushed, nothing missed. Our most expansive offering. You leave physically lighter, visibly brighter and far more settled than when you came in."
        availability: "East Legon · Cantonments"
