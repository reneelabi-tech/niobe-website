<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirming your account — Niobe Spa</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    body { margin: 0; background: #FFFEF6; font-family: Georgia, serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
    .msg { color: #2F241D; }
    .msg h1 { font-size: 1.5rem; font-weight: 300; margin-bottom: 0.5rem; }
    .msg p  { font-size: 0.9rem; opacity: 0.55; }
  </style>
</head>
<body>
  <div class="msg">
    <h1>Confirming your account&hellip;</h1>
    <p>You'll be redirected to your client hub in a moment.</p>
  </div>
  <script>
    var identity = window.netlifyIdentity;

    function goToHub() {
      window.location.replace('/client-hub.html');
    }

    identity.on('init', function(user) {
      if (user) goToHub();
    });

    identity.on('login', function() {
      goToHub();
    });

    identity.on('error', function(err) {
      document.querySelector('.msg h1').textContent = 'Confirmation failed';
      document.querySelector('.msg p').textContent = (err && err.message) ? err.message : 'Please try signing up again from the client hub.';
    });

    // Explicit API URL so widget finds the right Identity instance
    identity.init({
      APIUrl: 'https://niobebeauty.netlify.app/.netlify/identity'
    });

    // Fallback: poll every second in case events don't fire
    var poll = setInterval(function() {
      var user = identity.currentUser();
      if (user) {
        clearInterval(poll);
        goToHub();
      }
    }, 1000);

    // Stop polling after 15 seconds
    setTimeout(function() {
      clearInterval(poll);
    }, 15000);
  </script>
</body>
</html>
