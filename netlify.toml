[build]
  command   = "npm run build"
  publish   = "_site"

# Redirect Netlify Identity confirmation links to the admin panel
[[redirects]]
  from = "/"
  to   = "/index.html"
  status = 200
  conditions = {Role = ["admin", "editor"]}

# Required for Netlify Identity deep-link callback
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
